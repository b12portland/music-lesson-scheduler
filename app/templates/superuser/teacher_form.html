{% extends "base.html" %}
{% block title %}Add teacher — Music Lessons{% endblock %}

{% block content %}
<div class="form-page">
  <a href="{{ url_for('superuser.dashboard') }}" class="back-link">← Admin</a>
  <h1>Add teacher</h1>
  <form method="POST" action="{{ url_for('superuser.new_teacher') }}" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="field">
      <label for="name">Name <span class="required">*</span></label>
      <input type="text" id="name" name="name" required />
    </div>
    <div class="field">
      <label for="email">Email <span class="required">*</span></label>
      <input type="email" id="email" name="email" required />
    </div>
    <div class="field">
      <label for="password">Password <span class="required">*</span></label>
      <input type="password" id="password" name="password" required />
    </div>
    <button type="submit" class="btn btn--primary">Create teacher account</button>
  </form>
</div>
{% endblock %}
